# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# All sensitive values are read from .env file.
# Required env vars: POSTGRES_PASSWORD (strong password recommended)
# Optional: POSTGRES_USER, POSTGRES_DB, REDIS_PASSWORD

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-miniese}
      POSTGRES_USER: ${POSTGRES_USER:-miniese}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?error: POSTGRES_PASSWORD is required}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-miniese} -d ${POSTGRES_DB:-miniese}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?error: REDIS_PASSWORD is required}", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

volumes:
  pgdata:
  redisdata:

networks:
  internal:
    driver: bridge
